name: Build
on:
  push:
    branches:
      - main
      - auto/*

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Build
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
      - name: Run build.py
        run: |
          python ./ci/scripts/build.py