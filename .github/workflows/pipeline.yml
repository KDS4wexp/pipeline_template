name: Pipeline
on:
  push:
    branches:
      - main
      - auto/*

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # runs-on: self-hosted
    # container: 
    #   image: gcc:12.4.0
    steps:

      - name: Pipeline
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm install
          npm clean-install
          npm install --save-dev semantic-release @semantic-release/exec @semantic-release/changelog 

      - name: Generate last_tag.env & CHANGELOG.md
        run: |
          npx semantic-release
      
      - name: DEBUG
        run: echo $last_tag.env
        
      - name: Run build.py
        run: |
          python ./ci/scripts/build.py

      - name: Run test.py
        run: |
          python ./ci/scripts/test.py

      - name: Run deploy.py
        run: |
          python ./ci/scripts/deploy.py